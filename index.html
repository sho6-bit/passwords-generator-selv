<html>
    <head>
        <title>Password Generator</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fjalla+One&family=Karla:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="password-generator">
            <div class="title">
                <h1>Generate a 
                    <span>random password</span>
                </h1>
                <p>Never use an insecure password again.</p>
            </div>
            <div>
                <label for="password-length">Length: </label>
                <input type="number" id="password-length" min="1" max="15">
            </div>
            <div class="checkboxes">
                <div class="checkboxes-container">
                    <label for="include-symbols">Symbols: </label>
                    <label class="switch"> 
                        <input type="checkbox" id="include-symbols">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="checkboxes-container">
                    <label for="include-numbers">Numbers: </label>
                    <label class="switch">
                        <input type="checkbox" id="include-numbers">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <button id="generate-btn" onclick="generatePasswords()">Generate passwords</button>
            <hr>
            <p>Click on the generated password to copy it to your clipboard.</p>
            <div class="generated-passwords">
                <p id="first-password"></p>
                <p id="second-password"></p>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
